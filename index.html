<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW - SHOP UY TÍN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d0f17; --card-bg: #1a1d29; --accent: #7b2cbf; --text: #ffffff; --sub-text: #94a3b8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navbar giống video */
        .navbar { display: flex; align-items: center; padding: 15px; background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #232736; }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 20px; color: var(--sub-text); }
        .search-bar { background: #1e2230; border: none; border-radius: 12px; padding: 10px 15px; flex: 1; color: white; }

        /* Sidebar 3 gạch */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card-bg); transition: 0.3s; z-index: 200; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .side-item { padding: 15px; display: flex; align-items: center; border-radius: 12px; margin-bottom: 5px; cursor: pointer; color: var(--sub-text); }
        .side-item i { margin-right: 15px; width: 20px; text-align: center; }
        .side-item:hover, .side-item.active { background: #252a3d; color: var(--text); }

        /* Header giống Video */
        .header-card { background: var(--card-bg); margin: 15px; border-radius: 20px; padding: 20px; border: 1px solid #2d334a; }
        .balance-info { display: flex; justify-content: space-between; align-items: center; }
        .btn-nap-top { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Shop Section */
        .section-title { padding: 0 15px; color: var(--accent); display: flex; align-items: center; gap: 8px; font-weight: bold; margin-top: 20px; }
        .item-card { background: var(--card-bg); margin: 15px; border-radius: 20px; overflow: hidden; border: 1px solid #2d334a; position: relative; }
        .item-img { width: 100%; height: 200px; object-fit: cover; }
        .item-status { position: absolute; top: 10px; right: 10px; background: #22c55e; padding: 5px 10px; border-radius: 15px; font-size: 10px; font-weight: bold; }
        .item-info { padding: 15px; }
        .item-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .item-price { color: #22c55e; font-weight: bold; font-size: 20px; margin-bottom: 10px; display: block; }
        .item-desc { font-size: 12px; color: var(--sub-text); line-height: 1.5; margin-bottom: 15px; }
        .btn-buy { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Overlay & Modals */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; z-index: 1001; }
        input, select, textarea { width: 100%; background: #0d0f17; border: 1px solid #2d334a; color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .admin-log { background: #0d0f17; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 12px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <h2 style="color: var(--accent); text-align: center; margin-bottom: 30px;">SHADOW</h2>
        <div class="side-item active" onclick="location.reload()"><i class="fas fa-home"></i> Trang Chủ</div>
        <div class="side-item" onclick="viewModal('nap')"><i class="fas fa-wallet"></i> Nạp Tiền</div>
        <div class="side-item" id="admin-menu" style="display:none;" onclick="viewModal('admin')"><i class="fas fa-user-shield"></i> Admin Panel</div>
        <div class="side-item" onclick="location.reload()" style="margin-top: 50px; color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
    </div>

    <div id="app" style="display:none;">
        <div class="navbar">
            <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <input type="text" class="search-bar" placeholder="Tìm kiếm sản phẩm...">
        </div>

        <div class="header-card">
            <div class="balance-info">
                <div>
                    <div style="font-size: 12px; color: var(--sub-text);">Tài khoản: <span id="u-name" style="color: var(--text);"></span></div>
                    <div style="font-size: 26px; font-weight: bold; margin-top: 5px;"><span id="u-money">0</span>đ</div>
                </div>
                <button class="btn-nap-top" onclick="viewModal('nap')">NẠP TIỀN</button>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-bolt"></i> MENU UPDATE MỚI NHẤT</div>
        <div id="shop-items"></div>
    </div>

    <div id="auth-screen">
        <div class="modal" style="display: block; position: static; transform: none; margin: 100px auto; border: 1px solid #2d334a;">
            <h2 style="text-align: center; color: var(--accent);">ĐĂNG NHẬP</h2>
            <input type="text" id="auth-u" placeholder="Tên đăng nhập">
            <input type="password" id="auth-p" placeholder="Mật khẩu">
            <button class="btn-buy" onclick="handleLogin()">VÀO SHOP</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="modal" id="modal-nap">
        <h3>NẠP THẺ CÀO</h3>
        <select id="n-type"><option>Viettel</option><option>Mobifone</option><option>Vinaphone</option></select>
        <input type="text" id="n-seri" placeholder="Số Seri thẻ">
        <input type="text" id="n-code" placeholder="Mã thẻ">
        <select id="n-val">
            <option value="20000">20.000đ</option>
            <option value="50000">50.000đ</option>
            <option value="100000">100.000đ</option>
            <option value="200000">200.000đ</option>
        </select>
        <button class="btn-buy" onclick="sendNap()">GỬI THẺ DUYỆT</button>
    </div>

    <div class="modal" id="modal-admin" style="max-height: 85vh; overflow-y: auto;">
        <h3 style="color: var(--accent);">Quản lý Admin</h3>
        <div id="admin-nap-list"></div>
        <hr border="0" style="border-top:1px solid #333; margin:20px 0;">
        <h4>Thêm Key Hàng</h4>
        <select id="add-id">
            <option value="lv5">Acc Lv5 Google</option>
            <option value="drip">Drip Silent (Tím)</option>
            <option value="zy">Zygame VIP</option>
        </select>
        <textarea id="add-keys" rows="3" placeholder="Nhập Key (mỗi dòng 1 key)"></textarea>
        <button class="btn-buy" style="background: #22c55e;" onclick="addKeys()">CẬP NHẬT KHO</button>
    </div>

<script>
    let currentVinh = null;
    const MOD_DESC = "menu antiband updete thường xuyên lưu ý cách chơi khi muốn chơi thì log acc clone trước chơi 1 trận nếu không band thì có thể log acc 9 khi off nhớ đang xuất acc game";

    // Khởi tạo dữ liệu vào bộ nhớ máy (LocalStorage)
    if(!localStorage.getItem('shadow_v3')) {
        localStorage.setItem('shadow_v3', JSON.stringify({
            users: { "shadow+999": { pass: "HV0308hv", money: 1000000 } },
            stock: { lv5: [], drip: [], zy: [] },
            pending: []
        }));
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function handleLogin() {
        const u = document.getElementById('auth-u').value;
        const p = document.getElementById('auth-p').value;
        const db = JSON.parse(localStorage.getItem('shadow_v3'));

        if(u === "shadow+999" && p === "HV0308hv") {
            currentVinh = u;
            document.getElementById('admin-menu').style.display = 'flex';
        } else {
            if(!db.users[u]) db.users[u] = { pass: p, money: 0 };
            else if(db.users[u].pass !== p) return alert("Sai mật khẩu!");
            currentVinh = u;
        }
        
        localStorage.setItem('shadow_v3', JSON.stringify(db));
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('u-name').innerText = currentVinh;
        updateStats();
        renderShop();
    }

    function renderShop() {
        const shopData = [
            { id: 'lv5', name: 'Acc Lv5 Google', price: 2500, img: '1000182077.jpg' },
            { id: 'drip', name: 'Drip Silent', price: 150000, img: '1000182074.jpg' },
            { id: 'zy', name: 'Zygame VIP', price: 200000, img: '1000182075.jpg' }
        ];

        let html = '';
        shopData.forEach(item => {
            html += `
                <div class="item-card">
                    <div class="item-status">CÒN HÀNG</div>
                    <img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/400x200?text=Vinh+Kiem+Tra+Anh'">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <span class="item-price">${item.price.toLocaleString()}đ</span>
                        <div class="item-desc">${item.id === 'lv5' ? 'Tài khoản Clone cấp độ 5 phục vụ test.' : MOD_DESC}</div>
                        <button class="btn-buy" onclick="buyItem('${item.id}', ${item.price})">MUA NGAY</button>
                    </div>
                </div>`;
        });
        document.getElementById('shop-items').innerHTML = html;
    }

    function buyItem(id, price) {
        let db = JSON.parse(localStorage.getItem('shadow_v3'));
        if(db.users[currentVinh].money < price) return alert("Bạn không đủ tiền! Hãy nạp thêm.");
        if(db.stock[id].length === 0) return alert("Sản phẩm này hiện đang hết key!");

        const key = db.stock[id].shift(); // Lấy key đầu tiên và XÓA KHỎI KHO LUÔN
        db.users[currentVinh].money -= price;
        localStorage.setItem('shadow_v3', JSON.stringify(db));
        
        updateStats();
        alert("MUA THÀNH CÔNG!\nKey của bạn (Chỉ hiển thị 1 lần này): " + key);
    }

    function sendNap() {
        let db = JSON.parse(localStorage.getItem('shadow_v3'));
        db.pending.push({
            u: currentVinh,
            s: document.getElementById('n-seri').value,
            c: document.getElementById('n-code').value,
            v: parseInt(document.getElementById('n-val').value)
        });
        localStorage.setItem('shadow_v3', JSON.stringify(db));
        alert("Đã gửi thẻ thành công! Vui lòng chờ admin duyệt.");
        closeAll();
    }

    // --- ADMIN PANEL ---
    function addKeys() {
        let db = JSON.parse(localStorage.getItem('shadow_v3'));
        const id = document.getElementById('add-id').value;
        const keys = document.getElementById('add-keys').value.split('\n').filter(k => k.trim() !== "");
        db.stock[id] = [...db.stock[id], ...keys];
        localStorage.setItem('shadow_v3', JSON.stringify(db));
        alert("Đã thêm " + keys.length + " key vào kho!");
        document.getElementById('add-keys').value = "";
    }

    function loadPending() {
        let db = JSON.parse(localStorage.getItem('shadow_v3'));
        let h = '';
        db.pending.forEach((req, idx) => {
            h += `
                <div class="admin-log">
                    User: ${req.u} | Mệnh giá: ${req.v}đ<br>
                    Seri: <b id="s${idx}">${req.s}</b> <i class="fas fa-copy" onclick="copyText('s${idx}')"></i><br>
                    Mã: <b id="c${idx}">${req.c}</b> <i class="fas fa-copy" onclick="copyText('c${idx}')"></i><br>
                    <button onclick="approve(${idx})" style="color:#22c55e; border:none; background:none; font-weight:bold; cursor:pointer;">[DUYỆT]</button> | 
                    <button onclick="reject(${idx})" style="color:#ef4444; border:none; background:none; font-weight:bold; cursor:pointer;">[HỦY]</button>
                </div>`;
        });
        document.getElementById('admin-nap-list').innerHTML = h || "Chưa có yêu cầu nạp tiền nào.";
    }

    function approve(idx) {
        let db = JSON.parse(localStorage.getItem('shadow_v3'));
        const req = db.pending[idx];
        db.users[req.u].money += req.v;
        db.pending.splice(idx, 1);
        localStorage.setItem('shadow_v3', JSON.stringify(db));
        loadPending(); updateStats();
        alert("Đã duyệt nạp thành công!");
    }

    function reject(idx) {
        let db = JSON.parse(localStorage.getItem('shadow_v3'));
        db.pending.splice(idx, 1);
        localStorage.setItem('shadow_v3', JSON.stringify(db));
        loadPending();
        alert("Đã hủy thẻ này.");
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("Đã sao chép mã thẻ!");
    }

    function updateStats() {
        const db = JSON.parse(localStorage.getItem('shadow_v3'));
        document.getElementById('u-money').innerText = db.users[currentVinh].money.toLocaleString();
    }

    function viewModal(m) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal-' + m).style.display = 'block';
        if(m === 'admin') loadPending();
        document.getElementById('sidebar').classList.remove('active');
    }
    function closeAll() {
        document.querySelectorAll('.modal, .overlay, .sidebar').forEach(el => el.style.display = 'none');
    }
</script>
</body>
</html>
